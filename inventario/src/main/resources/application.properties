# Configuración del Servidor
server.port=8084
spring.application.name=inventario-service
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# Base de Datos independiente para Inventario
spring.datasource.url=jdbc:mysql://localhost:3306/db_inventario
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update

# URLs de los otros microservicios con los que se comunicará
app.auth.url=http://localhost:8081/api/v1/auth/validate
app.producto.url=http://localhost:8083/api/v1/productos