
server.port=8084
spring.application.name=inventario-service
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/


spring.datasource.url=jdbc:mysql://localhost:3306/db_inventario
spring.datasource.username=root
spring.datasource.password=


spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration


app.auth.url=http://auth-service/api/v1/auth/validate
app.producto.url=http://product-service/api/v1/productos
logging.file.name=inventario.log