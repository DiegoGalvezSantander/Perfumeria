server.port=8080
spring.application.name=api-gateway


eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/


spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/usuarios/**

spring.cloud.gateway.routes[2].id=product-service
spring.cloud.gateway.routes[2].uri=lb://product-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/productos/**

spring.cloud.gateway.routes[3].id=inventario-service
spring.cloud.gateway.routes[3].uri=lb://inventario-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/inventario/**

spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=lb://payment-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/pagos/**

spring.cloud.gateway.routes[5].id=venta-service
spring.cloud.gateway.routes[5].uri=lb://venta-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/ventas/**
